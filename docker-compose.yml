version: '3.8'

services:
  mongo1:
    image: mongo:6
    container_name: mongo1
    ports:
      - "27017:27017"

  mongo2:
    image: mongo:6
    container_name: mongo2
    ports:
      - "27018:27017"

  mongo3:
    image: mongo:6
    container_name: mongo3
    ports:
      - "27019:27017"

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # UI
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: 12345678
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data: